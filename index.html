<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공개 추첨 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c2e;
    --border: #2a2a4a;
    --accent: #f0c040;
    --accent2: #e05050;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --ball-shadow: 0 0 30px rgba(240,192,64,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 14px;
    margin-bottom: 16px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* Timestamp */
  .timestamp-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
    padding: 10px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .timestamp-bar .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #50e050;
    box-shadow: 0 0 8px #50e050;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Settings panel */
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .field {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    outline: none;
    padding-bottom: 4px;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-bottom-color: var(--accent);
  }

  .field .field-desc {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Draw button */
  .btn-draw {
    width: 100%;
    padding: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
    margin-bottom: 36px;
  }

  .btn-draw:hover:not(:disabled) {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(240,192,64,0.4);
  }

  .btn-draw:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Process section */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Pool display */
  .pool-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 24px;
    min-height: 80px;
  }

  .pool-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .pool-numbers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }

  .num-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s;
  }

  .num-chip.picked {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
    transform: scale(1.15);
    box-shadow: var(--ball-shadow);
  }

  .num-chip.eliminated {
    opacity: 0.15;
    text-decoration: line-through;
  }

  /* Steps log */
  .steps-log {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0;
    margin-bottom: 28px;
    max-height: 240px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .steps-log::-webkit-scrollbar { width: 4px; }
  .steps-log::-webkit-scrollbar-track { background: var(--surface2); }
  .steps-log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-entry {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .log-entry:last-child { border-bottom: none; }

  .log-step {
    color: var(--text-dim);
    min-width: 56px;
  }

  .log-arrow { color: var(--border); }

  .log-msg { color: var(--text); }

  .log-entry.highlight .log-msg {
    color: var(--accent);
    font-weight: 700;
  }

  .log-entry.system .log-msg {
    color: var(--text-dim);
    font-style: italic;
  }

  /* Results */
  .results-section {
    display: none;
  }

  .results-section.visible {
    display: block;
  }

  .results-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    padding: 32px 0;
  }

  .result-ball {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe580, var(--accent) 50%, #b08000);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #000;
    box-shadow: var(--ball-shadow), inset 0 -4px 8px rgba(0,0,0,0.3);
    animation: ballDrop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes ballDrop {
    from { transform: scale(0) rotate(-180deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  .results-summary {
    text-align: center;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
  }

  .results-summary .summary-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .results-summary .summary-nums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    font-weight: 700;
  }

  /* Seed display */
  .seed-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .seed-bar span.label {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .seed-bar span.val {
    color: var(--text);
  }

  /* Reset btn */
  .btn-reset {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
  }

  .btn-reset:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 520px) {
    .settings { grid-template-columns: 1fr; }
    .result-ball { width: 58px; height: 58px; font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">OFFICIAL DRAW</div>
    <h1>공개 <span>추첨</span> 시스템</h1>
    <p class="subtitle">투명한 공개 추첨 · 전 과정 기록</p>
  </header>

  <div class="timestamp-bar">
    <div class="live-dot"></div>
    <span id="live-time">--</span>
    <span style="color:var(--border)">|</span>
    <span id="live-date">--</span>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="field">
      <label>최대 숫자 (X)</label>
      <input type="number" id="maxNum" value="30" min="1" max="9999">
      <div class="field-desc">1 부터 이 숫자까지 추첨합니다</div>
    </div>
    <div class="field">
      <label>추첨 개수 (Y)</label>
      <input type="number" id="drawCount" value="5" min="1" max="9999">
      <div class="field-desc">뽑을 숫자의 개수</div>
    </div>
  </div>

  <button class="btn-draw" id="drawBtn" onclick="startDraw()">▶ 추첨 시작</button>

  <!-- Process -->
  <div id="processSection" style="display:none">

    <div class="section-title">추첨 정보</div>
    <div class="seed-bar" id="seedBar">—</div>

    <div class="section-title">후보 번호판</div>
    <div class="pool-box">
      <div class="pool-label">전체 번호 풀 (선택된 번호는 금색 강조)</div>
      <div class="pool-numbers" id="poolNumbers"></div>
    </div>

    <div class="section-title">추첨 과정 로그</div>
    <div class="steps-log" id="stepsLog"></div>

    <div class="results-section" id="resultsSection">
      <div class="section-title">최종 당첨 번호</div>
      <div class="results-grid" id="resultsGrid"></div>
      <div class="results-summary">
        <div class="summary-title">당첨 번호 요약</div>
        <div class="summary-nums" id="summaryNums">—</div>
      </div>
      <button class="btn-reset" onclick="resetAll()">↺ 다시 추첨하기</button>
    </div>

  </div>

</div>

<script>
// Live clock
function updateClock() {
  const now = new Date();
  document.getElementById('live-time').textContent =
    now.toLocaleTimeString('ko-KR', {hour12: false});
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
}
updateClock();
setInterval(updateClock, 1000);

// --- Draw logic ---
let running = false;

function seededRandom(seed) {
  // Mulberry32 PRNG — deterministic, verifiable
  let s = seed >>> 0;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function addLog(step, msg, highlight) {
  const log = document.getElementById('stepsLog');
  const el = document.createElement('div');
  el.className = 'log-entry' + (highlight ? ' highlight' : '');
  el.innerHTML = `<span class="log-step">[${String(step).padStart(3,'0')}]</span>
                  <span class="log-arrow">▸</span>
                  <span class="log-msg">${msg}</span>`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function addSystemLog(step, msg) {
  const log = document.getElementById('stepsLog');
  const el = document.createElement('div');
  el.className = 'log-entry system';
  el.innerHTML = `<span class="log-step">[${String(step).padStart(3,'0')}]</span>
                  <span class="log-arrow">▸</span>
                  <span class="log-msg">${msg}</span>`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startDraw() {
  if (running) return;

  const x = parseInt(document.getElementById('maxNum').value);
  const y = parseInt(document.getElementById('drawCount').value);

  if (!x || !y || x < 1 || y < 1) {
    alert('올바른 숫자를 입력해주세요.');
    return;
  }
  if (y > x) {
    alert(`추첨 개수(${y})가 최대 숫자(${x})보다 클 수 없습니다.`);
    return;
  }

  running = true;
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('processSection').style.display = 'block';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('stepsLog').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '';

  // Seed from timestamp
  const now = Date.now();
  const seed = now % 2147483647;
  const rand = seededRandom(seed);

  // Seed info
  document.getElementById('seedBar').innerHTML =
    `<span class="label">SEED</span><span class="val">${seed}</span>
     <span style="color:var(--border)">|</span>
     <span class="label">TIMESTAMP</span><span class="val">${now}</span>
     <span style="color:var(--border)">|</span>
     <span class="label">알고리즘</span><span class="val">Mulberry32 Fisher-Yates</span>`;

  // Build pool display
  const poolEl = document.getElementById('poolNumbers');
  poolEl.innerHTML = '';
  const chips = {};
  for (let i = 1; i <= x; i++) {
    const chip = document.createElement('div');
    chip.className = 'num-chip';
    chip.textContent = i;
    chip.id = `chip-${i}`;
    poolEl.appendChild(chip);
    chips[i] = chip;
  }

  await sleep(300);

  // Fisher-Yates shuffle with logging
  let step = 0;
  addSystemLog(step++, `추첨 시작 · 범위: 1 ~ ${x} · 추첨 개수: ${y}개`);
  addSystemLog(step++, `시드(Seed): ${seed}  (타임스탬프 기반)`);
  addSystemLog(step++, `알고리즘: Fisher-Yates Shuffle (편향 없는 무작위)`);
  await sleep(200);

  const pool = Array.from({length: x}, (_, i) => i + 1);
  const results = [];

  for (let i = 0; i < y; i++) {
    // Pick random index from remaining pool
    const remaining = x - i;
    const randVal = rand();
    const j = Math.floor(randVal * remaining);
    const picked = pool[j];

    // Swap to end
    pool[j] = pool[remaining - 1];
    pool[remaining - 1] = picked;

    // Animate chip
    chips[picked].classList.add('picked');

    addLog(step++,
      `${i+1}번째 추첨 · 남은 풀 ${remaining}개 · 난수 ${randVal.toFixed(6)} · 인덱스[${j}] → ★ ${picked} 선택!`,
      true);

    results.push(picked);

    // Mark eliminated (future non-results preview — skip for now)
    await sleep(Math.max(60, 500 - y * 15));
  }

  // Mark non-results as eliminated
  for (let n = 1; n <= x; n++) {
    if (!results.includes(n)) chips[n].classList.add('eliminated');
  }

  addSystemLog(step++, `추첨 완료 · 총 ${y}개 선택됨`);
  await sleep(300);

  // Show results
  const sorted = [...results].sort((a,b) => a - b);
  const grid = document.getElementById('resultsGrid');
  sorted.forEach((num, idx) => {
    const ball = document.createElement('div');
    ball.className = 'result-ball';
    ball.textContent = num;
    ball.style.animationDelay = `${idx * 80}ms`;
    grid.appendChild(ball);
  });

  document.getElementById('summaryNums').textContent = sorted.join('  /  ');
  document.getElementById('resultsSection').classList.add('visible');

  running = false;
}

function resetAll() {
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('processSection').style.display = 'none';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('stepsLog').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '';
}
</script>
</body>
</html>
