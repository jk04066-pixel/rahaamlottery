<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공개 추첨 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c2e;
    --border: #2a2a4a;
    --accent: #f0c040;
    --accent2: #e05050;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --ball-shadow: 0 0 30px rgba(240,192,64,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 14px;
    margin-bottom: 16px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 1px;
  }

  .timestamp-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
    padding: 10px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .timestamp-bar .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #50e050;
    box-shadow: 0 0 8px #50e050;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── 상품 섹션 ── */
  .prize-section {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 24px;
  }

  .prize-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .prize-header-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .btn-add-prize {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .btn-add-prize:hover {
    background: var(--accent);
    color: #000;
  }

  .prize-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .prize-row {
    display: grid;
    grid-template-columns: 1fr 80px 36px;
    gap: 8px;
    align-items: center;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .prize-row input[type="text"],
  .prize-row input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .prize-row input[type="text"]:focus,
  .prize-row input[type="number"]:focus {
    border-color: var(--accent);
  }

  .prize-row input[type="text"]::placeholder {
    color: var(--text-dim);
    font-size: 12px;
  }

  .btn-del-prize {
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-del-prize:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(224,80,80,0.08);
  }

  .prize-total-bar {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .prize-total-bar .pt-label { color: var(--accent); }

  /* ── 기존 설정 ── */
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 8px;
  }

  .field {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    outline: none;
    padding-bottom: 4px;
    transition: border-color 0.2s;
  }

  .field input:focus { border-bottom-color: var(--accent); }

  .field .field-desc {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .auto-hint {
    margin-bottom: 24px;
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .auto-hint span { color: var(--accent); }

  .btn-draw {
    width: 100%;
    padding: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
    margin-bottom: 36px;
  }

  .btn-draw:hover:not(:disabled) {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(240,192,64,0.4);
  }

  .btn-draw:disabled { opacity: 0.4; cursor: not-allowed; }

  .pool-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 24px;
    min-height: 80px;
  }

  .pool-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .pool-numbers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }

  .num-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s;
  }

  .num-chip.picked {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
    transform: scale(1.15);
    box-shadow: var(--ball-shadow);
  }

  .num-chip.eliminated { opacity: 0.15; text-decoration: line-through; }

  .steps-log {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0;
    margin-bottom: 28px;
    max-height: 240px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .steps-log::-webkit-scrollbar { width: 4px; }
  .steps-log::-webkit-scrollbar-track { background: var(--surface2); }
  .steps-log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-entry {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .log-entry:last-child { border-bottom: none; }
  .log-step { color: var(--text-dim); min-width: 56px; }
  .log-arrow { color: var(--border); }
  .log-msg { color: var(--text); }
  .log-entry.highlight .log-msg { color: var(--accent); font-weight: 700; }
  .log-entry.system .log-msg { color: var(--text-dim); font-style: italic; }

  .results-section { display: none; }
  .results-section.visible { display: block; }

  /* ── 결과 카드 (상품 포함) ── */
  .results-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .result-card {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: ballDrop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes ballDrop {
    from { transform: scale(0.7) translateY(10px); opacity: 0; }
    to   { transform: scale(1) translateY(0);      opacity: 1; }
  }

  .result-card .card-num {
    background: radial-gradient(circle at 35% 35%, #ffe580, var(--accent) 55%, #906000);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #000;
    min-height: 72px;
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.3);
  }

  .result-card .card-info {
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    border-left: 3px solid var(--accent);
  }

  .result-card .card-prize {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .result-card .card-prize-icon {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* 상품 없는 번호 (상품 초과시) */
  .result-card.no-prize .card-info { border-left-color: var(--border); }
  .result-card.no-prize .card-prize { color: var(--text-dim); font-weight: 400; }

  .results-summary {
    text-align: center;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
  }

  .results-summary .summary-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .results-summary .summary-nums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    font-weight: 700;
  }

  .seed-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .seed-bar span.label { color: var(--accent); font-weight: 700; letter-spacing: 1px; }
  .seed-bar span.val { color: var(--text); }

  .btn-reset {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
  }

  .btn-reset:hover { border-color: var(--text-dim); color: var(--text); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 520px) {
    .settings { grid-template-columns: 1fr; }
    .prize-row { grid-template-columns: 1fr 64px 32px; }
    .result-card .card-num { font-size: 18px; min-height: 60px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">OFFICIAL DRAW</div>
    <h1>공개 <span>추첨</span> 시스템</h1>
    <p class="subtitle">투명한 공개 추첨 · 전 과정 기록</p>
  </header>

  <div class="timestamp-bar">
    <div class="live-dot"></div>
    <span id="live-time">--</span>
    <span style="color:var(--border)">|</span>
    <span id="live-date">--</span>
  </div>

  <!-- 상품 목록 -->
  <div class="section-title">당첨 상품 설정</div>
  <div class="prize-section">
    <div class="prize-header">
      <div class="prize-header-title">🎁 상품 목록</div>
      <button class="btn-add-prize" onclick="addPrizeRow()">+ 상품 추가</button>
    </div>
    <div class="prize-list" id="prizeList"></div>
    <div class="prize-total-bar" id="prizeTotalBar">
      <span><span class="pt-label">상품 종류</span> <span id="ptKinds">0</span>가지</span>
      <span>|</span>
      <span><span class="pt-label">총 당첨 인원</span> <span id="ptTotal">0</span>명</span>
      <span>|</span>
      <span>추첨 개수(Y)는 자동으로 맞춰집니다</span>
    </div>
  </div>

  <!-- 추첨 설정 -->
  <div class="section-title">추첨 범위 설정</div>
  <div class="settings">
    <div class="field">
      <label>최대 숫자 (X)</label>
      <input type="number" id="maxNum" value="30" min="1" max="9999">
      <div class="field-desc">1 부터 이 숫자까지 추첨합니다</div>
    </div>
    <div class="field">
      <label>추첨 개수 (Y)</label>
      <input type="number" id="drawCount" value="2" min="1" max="9999" readonly style="cursor:default; opacity:0.7;">
      <div class="field-desc">상품 총 수량에 맞게 자동 설정됩니다</div>
    </div>
  </div>

  <div class="auto-hint" id="autoHint">
    상품을 입력하면 추첨 개수가 자동으로 설정됩니다.
  </div>

  <button class="btn-draw" id="drawBtn" onclick="startDraw()">▶ 추첨 시작</button>

  <!-- 진행 과정 -->
  <div id="processSection" style="display:none">

    <div class="section-title">추첨 정보</div>
    <div class="seed-bar" id="seedBar">—</div>

    <div class="section-title">후보 번호판</div>
    <div class="pool-box">
      <div class="pool-label">전체 번호 풀 (선택된 번호는 금색 강조)</div>
      <div class="pool-numbers" id="poolNumbers"></div>
    </div>

    <div class="section-title">추첨 과정 로그</div>
    <div class="steps-log" id="stepsLog"></div>

    <div class="results-section" id="resultsSection">
      <div class="section-title">최종 당첨 결과</div>
      <div class="results-grid" id="resultsGrid"></div>
      <div class="results-summary">
        <div class="summary-title">당첨 번호 요약</div>
        <div class="summary-nums" id="summaryNums">—</div>
      </div>
      <button class="btn-reset" onclick="resetAll()">↺ 다시 추첨하기</button>
    </div>

  </div>

</div>

<script>
// ── 시계 ──
function updateClock() {
  const now = new Date();
  document.getElementById('live-time').textContent =
    now.toLocaleTimeString('ko-KR', {hour12: false});
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
}
updateClock();
setInterval(updateClock, 1000);

// ── 상품 관리 ──
let prizeIdCounter = 0;

function addPrizeRow(name = '', qty = 1) {
  const id = ++prizeIdCounter;
  const list = document.getElementById('prizeList');
  const row = document.createElement('div');
  row.className = 'prize-row';
  row.dataset.id = id;
  row.innerHTML = `
    <input type="text"   class="prize-name" placeholder="상품명 (예: 오승환 사인볼)" value="${name}">
    <input type="number" class="prize-qty"  min="1" max="999" value="${qty}" title="수량">
    <button class="btn-del-prize" onclick="delPrizeRow(${id})" title="삭제">×</button>
  `;
  row.querySelector('.prize-name').addEventListener('input', updatePrizeSummary);
  row.querySelector('.prize-qty').addEventListener('input', updatePrizeSummary);
  list.appendChild(row);
  updatePrizeSummary();
}

function delPrizeRow(id) {
  const row = document.querySelector(`.prize-row[data-id="${id}"]`);
  if (row) row.remove();
  updatePrizeSummary();
}

function getPrizes() {
  const rows = document.querySelectorAll('.prize-row');
  const prizes = [];
  rows.forEach(row => {
    const name = row.querySelector('.prize-name').value.trim();
    const qty  = parseInt(row.querySelector('.prize-qty').value) || 1;
    if (name) prizes.push({ name, qty });
  });
  return prizes;
}

function updatePrizeSummary() {
  const prizes = getPrizes();
  const total  = prizes.reduce((s, p) => s + p.qty, 0);
  document.getElementById('ptKinds').textContent = prizes.length;
  document.getElementById('ptTotal').textContent = total;
  document.getElementById('drawCount').value     = total || '';

  if (prizes.length > 0) {
    const parts = prizes.map(p => `${p.name} × ${p.qty}`).join(' · ');
    document.getElementById('autoHint').innerHTML =
      `추첨 개수 자동 설정 : <span>${total}개</span> &nbsp;|&nbsp; ${parts}`;
  } else {
    document.getElementById('autoHint').innerHTML = '상품을 입력하면 추첨 개수가 자동으로 설정됩니다.';
  }
}

// 기본 상품 2개
addPrizeRow('오승환 사인볼', 1);
addPrizeRow('김지찬 사인볼', 1);

// ── 추첨 로직 ──
let running = false;

function seededRandom(seed) {
  let s = seed >>> 0;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function addLog(step, msg, highlight) {
  const log = document.getElementById('stepsLog');
  const el  = document.createElement('div');
  el.className = 'log-entry' + (highlight ? ' highlight' : '');
  el.innerHTML = `<span class="log-step">[${String(step).padStart(3,'0')}]</span>
                  <span class="log-arrow">▸</span>
                  <span class="log-msg">${msg}</span>`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function addSystemLog(step, msg) {
  const log = document.getElementById('stepsLog');
  const el  = document.createElement('div');
  el.className = 'log-entry system';
  el.innerHTML = `<span class="log-step">[${String(step).padStart(3,'0')}]</span>
                  <span class="log-arrow">▸</span>
                  <span class="log-msg">${msg}</span>`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startDraw() {
  if (running) return;

  const prizes = getPrizes();
  const x      = parseInt(document.getElementById('maxNum').value);
  const y      = prizes.reduce((s, p) => s + p.qty, 0);

  if (prizes.length === 0) { alert('상품을 1개 이상 입력해주세요.'); return; }
  if (!x || x < 1)         { alert('최대 숫자(X)를 입력해주세요.'); return; }
  if (y > x) {
    alert(`총 당첨 인원(${y}명)이 최대 숫자(${x})보다 클 수 없습니다.`);
    return;
  }

  running = true;
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('processSection').style.display = 'block';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('stepsLog').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '';

  const now  = Date.now();
  const seed = now % 2147483647;
  const rand = seededRandom(seed);

  document.getElementById('seedBar').innerHTML =
    `<span class="label">SEED</span><span class="val">${seed}</span>
     <span style="color:var(--border)">|</span>
     <span class="label">TIMESTAMP</span><span class="val">${now}</span>
     <span style="color:var(--border)">|</span>
     <span class="label">알고리즘</span><span class="val">Mulberry32 Fisher-Yates</span>`;

  // 번호 풀 생성
  const poolEl = document.getElementById('poolNumbers');
  poolEl.innerHTML = '';
  const chips = {};
  for (let i = 1; i <= x; i++) {
    const chip = document.createElement('div');
    chip.className = 'num-chip';
    chip.textContent = i;
    chip.id = `chip-${i}`;
    poolEl.appendChild(chip);
    chips[i] = chip;
  }

  await sleep(300);

  let step = 0;
  addSystemLog(step++, `추첨 시작 · 범위: 1 ~ ${x} · 총 추첨 인원: ${y}명`);
  addSystemLog(step++, `시드(Seed): ${seed}  (타임스탬프 기반)`);
  addSystemLog(step++, `알고리즘: Fisher-Yates Shuffle (편향 없는 무작위)`);

  // 상품 목록 로그
  prizes.forEach((p, i) => {
    addSystemLog(step++, `상품 ${i+1}: ${p.name}  ×  ${p.qty}개`);
  });
  await sleep(200);

  // 추첨
  const pool    = Array.from({length: x}, (_, i) => i + 1);
  const results = []; // { num, prize }

  // 상품 순서 배열 펼치기 (오승환 1개, 김지찬 1개 → [오승환, 김지찬])
  const prizeQueue = [];
  prizes.forEach(p => {
    for (let k = 0; k < p.qty; k++) prizeQueue.push(p.name);
  });

  for (let i = 0; i < y; i++) {
    const remaining = x - i;
    const randVal   = rand();
    const j         = Math.floor(randVal * remaining);
    const picked    = pool[j];
    const prize     = prizeQueue[i];

    pool[j]            = pool[remaining - 1];
    pool[remaining - 1] = picked;

    chips[picked].classList.add('picked');

    addLog(step++,
      `${i+1}번째 추첨 [${prize}] · 남은 풀 ${remaining}개 · 난수 ${randVal.toFixed(6)} · 인덱스[${j}] → ★ ${picked}번 선택!`,
      true);

    results.push({ num: picked, prize });
    await sleep(Math.max(80, 600 - y * 20));
  }

  // 미당첨 처리
  for (let n = 1; n <= x; n++) {
    if (!results.find(r => r.num === n)) chips[n].classList.add('eliminated');
  }

  addSystemLog(step++, `추첨 완료 · 총 ${y}명 당첨`);
  await sleep(300);

  // 결과 카드 (번호 오름차순)
  const sorted = [...results].sort((a, b) => a.num - b.num);
  const grid   = document.getElementById('resultsGrid');

  sorted.forEach((r, idx) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = `${idx * 80}ms`;
    card.innerHTML = `
      <div class="card-num">${r.num}</div>
      <div class="card-info">
        <div class="card-prize-icon">🎁 당첨 상품</div>
        <div class="card-prize">${r.prize}</div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('summaryNums').textContent =
    sorted.map(r => `${r.num}번 (${r.prize})`).join('  /  ');

  document.getElementById('resultsSection').classList.add('visible');
  running = false;
}

function resetAll() {
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('processSection').style.display = 'none';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('stepsLog').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '';
}
</script>

  <!-- BGM -->
  <audio id="bgm" src="사다리타기_BGM.mp3" preload="auto"></audio>
<script>
(function() {
  const audio = document.getElementById("bgm");
  const START = 1, END = 12;
  function tryPlay() { audio.currentTime = START; audio.play().catch(()=>{}); }
  audio.addEventListener("timeupdate", function() {
    if (audio.currentTime >= END) audio.currentTime = START;
  });
  document.addEventListener("DOMContentLoaded", function() {
    audio.currentTime = START;
    audio.play().catch(function() {
      const go = function() { tryPlay(); document.removeEventListener("click",go); document.removeEventListener("touchstart",go); };
      document.addEventListener("click", go);
      document.addEventListener("touchstart", go);
    });
  });
})();
</script>
</body>
